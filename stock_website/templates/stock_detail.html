<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票详情 - {{ stock_code }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <!-- 顶部导航栏 -->
        <header class="header">
            <div class="back-button">
                <a href="/" class="btn-back">
                    <i class="fas fa-arrow-left"></i>
                    返回主页
                </a>
            </div>

            <div class="stock-title">
                <h1 id="stock-title">股票详情</h1>
            </div>

            <div class="theme-toggle">
                <button id="theme-toggle-btn" class="theme-btn">
                    <i class="fas fa-moon" id="theme-icon"></i>
                    <span id="theme-text">Dark</span>
                </button>
            </div>
        </header>

        <!-- 主要内容区域 -->
        <main class="main-content">
            <!-- 加载状态 -->
            <div id="loading" class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <span>加载股票数据中...</span>
            </div>

            <!-- 股票信息卡片 -->
            <div class="stock-info-card" id="stock-info-card" style="display: none;">
                <div class="stock-header">
                    <div class="stock-basic">
                        <h2 id="stock-name">股票名称</h2>
                        <p id="stock-code-display">股票代码</p>
                    </div>
                    <div class="stock-price">
                        <span id="current-price" class="price">0.00</span>
                        <span id="price-change" class="change">+0.00%</span>
                    </div>
                </div>
            </div>

            <!-- 图表容器 -->
            <div class="chart-container" id="chart-container" style="display: none;">
                <h3>近20个交易日价格走势</h3>
                <canvas id="price-chart"></canvas>
            </div>

            <!-- 错误信息 -->
            <div id="error-message" class="error-message" style="display: none;">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="error-text"></span>
            </div>
        </main>
    </div>

    <script>
        // 从URL获取股票代码
        const stockCode = "{{ stock_code }}";
    </script>
    <script src="{{ url_for('static', filename='js/stock_detail.js') }}"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
