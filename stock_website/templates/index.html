<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票信息系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 顶部导航栏 -->
        <header class="header">
            <!-- 左侧：当前时间 -->
            <div class="time-display">
                <i class="fas fa-clock"></i>
                <span id="current-time"></span>
            </div>

            <!-- 中间：搜索框 -->
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="输入股票代码或名称搜索..." autocomplete="off">
                    <button id="search-btn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                <div id="search-results" class="search-results"></div>
            </div>

            <!-- 右侧：主题切换 -->
            <div class="theme-toggle">
                <button id="theme-toggle-btn" class="theme-btn">
                    <i class="fas fa-moon" id="theme-icon"></i>
                    <span id="theme-text">Dark</span>
                </button>
            </div>
        </header>

        <!-- 主要内容区域 -->
        <main class="main-content">
            <h1 class="page-title">A股市场实时数据</h1>

            <!-- 加载状态 -->
            <div id="loading" class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <span>加载中...</span>
            </div>

            <!-- 股票表格 -->
            <div class="table-container" id="table-container" style="display: none;">
                <!-- 分页信息 -->
                <div class="pagination-info">
                    <span id="page-info">正在加载...</span>
                </div>

                <table class="stock-table" id="stock-table">
                    <thead>
                        <tr>
                            <th data-sort="id">序号 <i class="fas fa-sort"></i></th>
                            <th data-sort="stock_code">股票代码 <i class="fas fa-sort"></i></th>
                            <th data-sort="stock_name">股票名称 <i class="fas fa-sort"></i></th>
                            <th data-sort="change_pct">今日涨跌 <i class="fas fa-sort"></i></th>
                            <th data-sort="current_price">股票价格 <i class="fas fa-sort"></i></th>
                            <th data-sort="volume_ratio">今日量比 <i class="fas fa-sort"></i></th>
                            <th data-sort="market_value">当前市值 <i class="fas fa-sort"></i></th>
                            <th data-sort="ttm">当前TTM <i class="fas fa-sort"></i></th>
                        </tr>
                    </thead>
                    <tbody id="stock-tbody">
                        <!-- 数据将通过JavaScript动态加载 -->
                    </tbody>
                </table>

                <!-- 分页控件 -->
                <div class="pagination-controls" id="page-controls">
                    <button id="first-page" onclick="goToPage(1)">
                        <i class="fas fa-angle-double-left"></i> 首页
                    </button>
                    <button id="prev-page" onclick="goToPage(currentPage - 1)">
                        <i class="fas fa-angle-left"></i> 上一页
                    </button>
                    <div class="page-input">
                        <input type="number" id="page-number" min="1" onchange="goToPage(parseInt(this.value))">
                    </div>
                    <button id="next-page" onclick="goToPage(currentPage + 1)">
                        下一页 <i class="fas fa-angle-right"></i>
                    </button>
                    <button id="last-page" onclick="goToPage(Math.ceil(stocksData.length / itemsPerPage))">
                        末页 <i class="fas fa-angle-double-right"></i>
                    </button>
                </div>
            </div>

            <!-- 错误信息 -->
            <div id="error-message" class="error-message" style="display: none;">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="error-text"></span>
            </div>
        </main>
    </div>

    <!-- 搜索结果弹窗 -->
    <div id="search-modal" class="modal">
        <div class="modal-content">
            <span class="close" id="close-modal">&times;</span>
            <h2>股票信息</h2>
            <div id="stock-info"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
